# 仅启动一个 Neo4j 容器，供第 3-5 节使用。
# 第 1-2 节（纯向量 RAG）不需要这个容器，可以跳过。
services:
  neo4j:
    image: neo4j:5
    container_name: devdocqa-neo4j
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt 协议
    environment:
      - NEO4J_AUTH=neo4j/devdocqa-pass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
