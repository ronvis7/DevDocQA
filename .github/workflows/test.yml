name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # 冷启动需装 PyTorch CPU + sentence-transformers (~1.5GB)，给足余量
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Run pytest
        # 不需要 DeepSeek 的测试都会跑；需要 API key 的会按现有 skipif 自动跳过
        run: uv run pytest -v --tb=short
        env:
          # shared/config.py 在 import 时校验 DEEPSEEK_API_KEY；
          # CI 没真实 key，给一个非 sk-xxx 前缀的占位让 import 通过；
          # 真正调 DeepSeek 的测试本来就 skip / 不在 CI 跑。
          DEEPSEEK_API_KEY: ci-dummy-key-not-for-real-calls
          # HuggingFace endpoint（hf-mirror 在 CI 节点也能访问，作为 fallback）
          HF_ENDPOINT: https://hf-mirror.com
